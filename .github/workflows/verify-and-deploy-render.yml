name: Verify and deploy (Render)

on:
  push:
    branches:
      - "main"
      - "cursor/**"
      - "cursor/-bc-3072b8d9-e1a5-40ee-ba8e-b3e207efb0d0-aaef"
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install -r requirements.txt

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest -q

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  deploy_frontend:
    runs-on: ubuntu-latest
    needs: verify
    env:
      RENDER_FRONTEND_DEPLOY_HOOK_URL: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL || secrets.RENDER_FRONTEND_DEPLOY_HOOK }}
    steps:
      - name: Trigger Render frontend deploy
        run: |
          if [ -z "${RENDER_FRONTEND_DEPLOY_HOOK_URL}" ]; then
            echo "RENDER_FRONTEND_DEPLOY_HOOK_URL is not set, skipping deploy."
            exit 0
          fi
          curl -fsS -X POST "${RENDER_FRONTEND_DEPLOY_HOOK_URL}"

  deploy_backend:
    runs-on: ubuntu-latest
    needs: verify
    env:
      RENDER_BACKEND_DEPLOY_HOOK_URL: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL || secrets.RENDER_BACKEND_DEPLOY_HOOK }}
    steps:
      - name: Trigger Render backend deploy
        run: |
          if [ -z "${RENDER_BACKEND_DEPLOY_HOOK_URL}" ]; then
            echo "RENDER_BACKEND_DEPLOY_HOOK_URL is not set, skipping deploy."
            exit 0
          fi
          curl -fsS -X POST "${RENDER_BACKEND_DEPLOY_HOOK_URL}"
